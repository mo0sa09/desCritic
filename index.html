<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Design Critic — نقد تصميمك باحترافية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <!-- ══════════════ HEADER ══════════════ -->
  <header class="hdr">
    <div class="logo"><span>[</span>DC<span>]</span></div>
    <div class="badge">Design Critic v1.0</div>
  </header>

  <!-- ══════════════ UPLOAD SCREEN ══════════════ -->
  <div class="screen" id="uploadScreen">
    <div class="up-inner">

      <div class="hero-tag">AI-Powered Design Analysis</div>

      <h1>ارفع تصميمك و<em>خذ نقد احترافي</em><br/>خلال ثواني</h1>
      <p class="sub">لا مجاملات. لا كلام فارغ. نقد حقيقي يبني.</p>

      <!-- Upload Zone -->
      <div class="uzone" id="uzone">
        <input type="file" id="fileInput" accept="image/*" hidden />

        <!-- Idle state -->
        <div class="u-idle" id="uIdle">
          <div class="u-icon">
            <svg width="38" height="38" viewBox="0 0 48 48" fill="none">
              <path d="M24 6v26M24 6L14 16M24 6l10 10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6 36v6h36v-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
          </div>
          <p class="u-text">اسحب صورتك هنا أو</p>
          <button class="btn-up" id="trigBtn">اختر ملف</button>
          <p class="u-hint">PNG · JPG · WEBP · SVG — max 10MB</p>
        </div>

        <!-- Preview state -->
        <div class="u-prev hidden" id="uPrev">
          <img id="prevImg" src="" alt="preview" />
          <div class="prev-bar">
            <span class="fname" id="fnameEl"></span>
            <button class="btn-chg" id="chgBtn">تغيير</button>
          </div>
        </div>
      </div>

      <!-- Error box -->
      <div class="err-box hidden" id="errBox"></div>

      <!-- Analyze button -->
      <button class="btn-analyze" id="analyzeBtn" disabled>
        <span>ابدأ التحليل</span>
        <span class="arr">←</span>
      </button>

    </div>
  </div>

  <!-- ══════════════ LOADER SCREEN ══════════════ -->
  <div class="screen hidden" id="loaderScreen">
    <div class="loader-inner">
      <div class="spin"></div>
      <p class="loader-msg">جاري تحليل التصميم…</p>
      <div class="steps">
        <span class="stp">🔍 فحص البنية</span>
        <span class="stp">🎨 تحليل الألوان</span>
        <span class="stp">🧠 توليد النقد</span>
        <span class="stp">✅ جاهز</span>
      </div>
    </div>
  </div>

  <!-- ══════════════ RESULTS SCREEN ══════════════ -->
  <div class="screen hidden" id="resultsScreen">

    <!-- Top bar: thumbnail + summary + overall score -->
    <div class="res-top">
      <img class="res-thumb" id="resThumb" src="" alt="" />
      <div class="res-meta">
        <div class="res-label">تقرير النقد</div>
        <div class="res-name" id="resName">—</div>
        <div class="res-sum" id="resSummary"></div>
      </div>
      <div class="opill">
        <div class="o-num" id="oNum">—</div>
        <div class="o-lbl">/ 10</div>
      </div>
    </div>

    <!-- Cards grid -->
    <div class="cards-wrap">
      <div class="grid" id="grid"></div>
    </div>

    <!-- Footer -->
    <div class="res-foot">
      <button class="btn-reset" id="resetBtn">↑ تحليل تصميم آخر</button>
    </div>

  </div>

</div><!-- /#app -->

<script src="app.js"></script>
</body>
</html>
